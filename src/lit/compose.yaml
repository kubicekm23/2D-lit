services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: litgame
      POSTGRES_USER: lit
      POSTGRES_PASSWORD: litpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  litwebapp:
    image: litwebapp
    build:
      context: .
      dockerfile: litWebApp/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=litgame;Username=lit;Password=litpass"

volumes:
  pgdata:
