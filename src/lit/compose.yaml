services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: litgame
      POSTGRES_USER: lit
      POSTGRES_PASSWORD: litpass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lit -d litgame"]
      interval: 2s
      timeout: 5s
      retries: 10

  litwebapp:
    image: litwebapp
    build:
      context: ./litWebApp
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=litgame;Username=lit;Password=litpass"

volumes:
  pgdata:
